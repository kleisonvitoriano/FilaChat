<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fila Chat (Liquid Glass)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { 
            extend: { 
                colors: { 
                    apple: {
                        blue: '#007AFF',
                        dark: '#1D1D1F',
                        gray: '#86868B'
                    }
                } 
            } 
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { 
        font-family: "Inter", sans-serif; 
        /* Apple-style Mesh Gradient Background */
        background-color: #ff9a9e;
        background-image:
            radial-gradient(at 40% 20%, hsla(28,100%,74%,1) 0px, transparent 50%),
            radial-gradient(at 80% 0%, hsla(189,100%,56%,1) 0px, transparent 50%),
            radial-gradient(at 0% 50%, hsla(355,100%,93%,1) 0px, transparent 50%),
            radial-gradient(at 80% 50%, hsla(340,100%,76%,1) 0px, transparent 50%),
            radial-gradient(at 0% 100%, hsla(22,100%,77%,1) 0px, transparent 50%),
            radial-gradient(at 80% 100%, hsla(242,100%,70%,1) 0px, transparent 50%),
            radial-gradient(at 0% 0%, hsla(343,100%,76%,1) 0px, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
        color: #1d1d1f; 
        min-height: 100dvh;
      }
      
      /* Efeitos Glassmorphism (Liquid Glass) */
      .glass-panel {
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
      }

      .glass-header {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      }

      .glass-input {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        color: #1d1d1f;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.7);
        border-color: rgba(255, 255, 255, 0.9);
        outline: none;
      }

      .glass-button {
        background: rgba(0, 122, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
      }
      .glass-button:hover { background: rgba(0, 122, 255, 0.85); }

      .glass-item:hover { background: rgba(255, 255, 255, 0.25); }

      .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

      .truncate-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

      /* Ajustes Responsivos & Notches (iPhone) */
      .pt-safe { padding-top: max(1rem, env(safe-area-inset-top)) !important; }
      .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)) !important; }

      /* Estilos Móveis Nativos (Ocultar bordas do vidro nas margens do ecrã) */
      @media (max-width: 639px) {
        .glass-panel {
          border: none !important;
          border-radius: 0 !important;
          box-shadow: none !important;
        }
        .fab-btn {
          bottom: max(1.5rem, env(safe-area-inset-bottom)) !important;
        }
      }
    </style>
  </head>
  <body class="antialiased h-[100dvh] w-full flex flex-col overflow-hidden sm:p-4">

    <!-- LOADER -->
    <div id="loading-section" class="fixed inset-0 z-[99999] flex items-center justify-center bg-white/50 backdrop-blur-xl transition-opacity duration-300">
      <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-apple-blue"></div>
    </div>

    <!-- ECRÃ DE AUTENTICAÇÃO -->
    <div id="auth-screen" style="display: none;" class="flex-1 flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-sm glass-panel p-8 rounded-[2rem] fade-in text-center">
        <div class="w-16 h-16 bg-white/40 backdrop-blur-md border border-white/50 rounded-[1.2rem] flex items-center justify-center mx-auto mb-5 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-apple-dark"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-6 tracking-tight">Fila Chat</h1>
        <div id="login-form">
          <input type="email" id="loginEmail" placeholder="E-mail" class="glass-input rounded-xl px-4 py-3 mb-4 w-full transition-all text-[16px]" />
          <input type="password" id="loginPassword" placeholder="Palavra-passe" class="glass-input rounded-xl px-4 py-3 mb-6 w-full transition-all text-[16px]" />
          <button type="button" id="login-btn" class="w-full glass-button text-white font-semibold py-3.5 rounded-xl transition-all">Iniciar Sessão</button>
        </div>
        <p class="mt-5 text-sm text-gray-700 font-medium">Use a conta da Fila Virtual.</p>
      </div>
    </div>

    <!-- ECRÃ PRINCIPAL (LISTA DE CONVERSAS) -->
    <!-- Classes base e responsivas aplicadas diretamente na DIV -->
    <div id="home-screen" style="display: none;" class="glass-panel flex-1 flex flex-col w-full sm:max-w-md mx-auto relative h-full sm:h-[90dvh] sm:my-auto sm:rounded-[2.5rem] sm:overflow-hidden">
      <!-- Cabeçalho -->
      <header class="glass-header shrink-0 text-apple-dark p-4 flex justify-between items-center z-10 pt-safe">
        <h1 class="text-xl font-bold tracking-tight">Mensagens</h1>
        <div class="flex gap-4 items-center">
          <button id="logout-btn" title="Terminar Sessão" class="text-apple-dark hover:text-apple-blue transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </header>

      <!-- Lista de Conversas -->
      <div id="chat-list" class="flex-1 overflow-y-auto">
        <!-- As conversas serão renderizadas aqui -->
      </div>

      <!-- FAB (Nova Conversa) -->
      <button id="new-chat-btn" class="fab-btn absolute bottom-6 right-6 glass-button text-white p-4 rounded-full transition-transform active:scale-90 z-10 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
      </button>
    </div>

    <!-- ECRÃ DE CONTACTOS -->
    <div id="contacts-screen" style="display: none;" class="glass-panel flex-1 flex flex-col w-full sm:max-w-md mx-auto relative h-full sm:h-[90dvh] sm:my-auto sm:rounded-[2.5rem] sm:overflow-hidden">
      <header class="glass-header shrink-0 text-apple-dark p-4 flex items-center z-10 pt-safe">
        <button id="back-from-contacts-btn" class="mr-3 text-apple-blue hover:bg-white/30 p-2 rounded-full transition-colors -ml-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div>
            <h1 class="text-xl font-bold tracking-tight">Nova Mensagem</h1>
            <p class="text-xs text-gray-600 font-medium" id="contacts-count">A carregar...</p>
        </div>
      </header>

      <!-- Nova Barra de Pesquisa -->
      <div class="glass-header shrink-0 px-4 pb-3 pt-2 z-10 relative border-t-0">
        <div class="relative">
          <svg class="w-5 h-5 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input type="text" id="contact-search-input" placeholder="Pesquisar contacto..." class="glass-input w-full rounded-xl py-2 pl-10 pr-4 outline-none text-[16px] placeholder-gray-500 transition-all">
        </div>
      </div>

      <div id="contacts-list" class="flex-1 overflow-y-auto pt-2">
        <!-- Os contactos serão renderizados aqui -->
      </div>
    </div>

    <!-- ECRÃ DE CONVERSA ATIVA -->
    <div id="active-chat-screen" style="display: none;" class="glass-panel flex-1 flex flex-col w-full sm:max-w-md mx-auto relative h-full sm:h-[90dvh] sm:my-auto sm:rounded-[2.5rem] sm:overflow-hidden">
      <!-- Cabeçalho da Conversa -->
      <header class="glass-header shrink-0 text-apple-dark p-3 flex items-center z-10 pt-safe cursor-pointer">
        <button id="back-to-home-btn" class="mr-1 text-apple-blue hover:bg-white/30 p-2 rounded-full transition-colors -ml-1 flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="relative mr-3">
          <img id="active-chat-avatar" src="" alt="Avatar" class="w-10 h-10 rounded-full object-cover bg-white/50 border border-white/60 shadow-sm">
        </div>
        <div class="flex-1 min-w-0">
          <h2 id="active-chat-name" class="font-bold text-[15px] truncate tracking-tight text-gray-900">Nome do Contacto</h2>
          <p id="active-chat-status" class="text-[11px] text-gray-600 font-medium truncate">a carregar...</p>
        </div>
      </header>

      <!-- Área de Mensagens -->
      <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col bg-transparent">
        <!-- As mensagens serão renderizadas aqui -->
      </div>

      <!-- Área de Introdução de Texto -->
      <div class="glass-header shrink-0 p-3 flex items-center gap-2 z-10 pb-safe">
        <input type="text" id="message-input" placeholder="Mensagem do iMessage..." class="glass-input flex-1 rounded-full py-2.5 px-5 outline-none text-[16px] placeholder-gray-500 transition-all" autocomplete="off" />
        <button id="send-msg-btn" class="bg-apple-blue/90 backdrop-blur-md border border-white/20 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-apple-blue transition-transform active:scale-90 shadow-sm shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
      </div>
    </div>

    <!-- Scripts do Firebase e Lógica -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, addDoc, serverTimestamp, where, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // A usar a MESMA configuração fornecida para aceder ao banco de dados original
      const firebaseConfig = {
        apiKey: "AIzaSyDRf7ZciyvbJkX-P5cfWkzfI2Uw11Lxy0Q",
        authDomain: "filaonibus.firebaseapp.com",
        projectId: "filaonibus",
        storageBucket: "filaonibus.appspot.com",
        messagingSenderId: "93496874568",
        appId: "1:93496874568:web:52b127aa7d70dc8471aa7d"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const el = (id) => document.getElementById(id);

      let currentUser = null;
      let userProfile = null;
      let activeChatId = null;
      let targetUser = null;
      let allUsersMap = {};
      
      let unsubs = {
          chatsList: null,
          activeMessages: null,
          targetPresence: null,
          usersList: null
      };

      function clearAllListeners() {
          Object.keys(unsubs).forEach(key => {
              if (unsubs[key]) {
                  unsubs[key]();
                  unsubs[key] = null;
              }
          });
      }

      function formatTime(timestamp) {
          if (!timestamp || typeof timestamp.toDate !== 'function') return '';
          return timestamp.toDate().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
      }

      function setPresence(isOnline) {
          if (!currentUser) return;
          const userRef = doc(db, "users", currentUser.uid);
          updateDoc(userRef, { 
              isOnline: isOnline, 
              lastSeen: serverTimestamp() 
          }).catch(err => console.warn("Aviso ao atualizar presença:", err));
      }

      setInterval(() => {
          if (currentUser && document.visibilityState === 'visible') {
              setPresence(true);
          }
      }, 60000);

      document.addEventListener("visibilitychange", () => {
          if (currentUser) {
              setPresence(document.visibilityState === 'visible');
          }
      });

      window.addEventListener("beforeunload", () => setPresence(false));

      function showScreen(screenId) {
          ["auth-screen", "home-screen", "contacts-screen", "active-chat-screen"].forEach(id => {
              el(id).style.display = "none";
          });
          el(screenId).style.display = "flex";
      }

      function getChatId(uid1, uid2) {
          return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
      }

      onAuthStateChanged(auth, async (user) => {
        el("loading-section").style.display = "flex";
        if (user) {
            currentUser = user;
            try {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userProfile = { uid: user.uid, ...snap.data() };
                } else {
                    userProfile = { uid: user.uid, email: user.email, name: user.email.split('@')[0], photoUrl: "" };
                    try {
                        await setDoc(doc(db, "users", user.uid), userProfile);
                    } catch(e) {
                        console.warn("Aviso: Sem permissão para criar perfil.", e);
                    }
                }
            } catch (err) {
                console.warn("Aviso: Sem permissão para ler perfil. A continuar com os dados da sessão.", err);
                userProfile = { uid: user.uid, email: user.email, name: user.email.split('@')[0], photoUrl: "" };
            }
            
            setPresence(true);
            showScreen("home-screen");
            loadChatsList();
        } else {
            currentUser = null;
            userProfile = null;
            clearAllListeners();
            showScreen("auth-screen");
        }
        el("loading-section").style.display = "none";
      });

      el("login-btn").addEventListener("click", async () => {
          const email = el("loginEmail").value.trim();
          const pwd = el("loginPassword").value;
          if (!email || !pwd) return alert("Preencha o e-mail e a palavra-passe.");
          
          el("loading-section").style.display = "flex";
          try {
              await signInWithEmailAndPassword(auth, email, pwd);
          } catch (e) {
              alert("Erro ao iniciar sessão. Verifique as suas credenciais.");
              el("loading-section").style.display = "none";
          }
      });

      el("logout-btn").addEventListener("click", () => {
          setPresence(false);
          signOut(auth);
      });

      function loadChatsList() {
          if (unsubs.chatsList) unsubs.chatsList();
          
          const q = query(
              collection(db, "chats"), 
              where("participants", "array-contains", currentUser.uid)
          );

          unsubs.chatsList = onSnapshot(q, async (snapshot) => {
              const chatListEl = el("chat-list");
              if (snapshot.empty) {
                  chatListEl.innerHTML = `<div class="p-8 text-center text-gray-600 font-medium">Nenhuma conversa ainda.<br>Clique no botão abaixo para começar.</div>`;
                  return;
              }

              let html = '';
              const chatsData = [];

              snapshot.forEach(docSnap => {
                  const data = docSnap.data();
                  const otherUid = data.participants.find(uid => uid !== currentUser.uid);
                  chatsData.push({ chatId: docSnap.id, otherUid, ...data });
              });

              chatsData.sort((a, b) => {
                  const timeA = a.lastMessageTime?.toMillis() || 0;
                  const timeB = b.lastMessageTime?.toMillis() || 0;
                  return timeB - timeA;
              });

              for (const chat of chatsData) {
                  if (!allUsersMap[chat.otherUid]) {
                      try {
                          const userSnap = await getDoc(doc(db, "users", chat.otherUid));
                          allUsersMap[chat.otherUid] = userSnap.exists() ? userSnap.data() : { name: "Utilizador Desconhecido", photoUrl: "" };
                      } catch (e) {
                          allUsersMap[chat.otherUid] = { name: "Utilizador Oculto", photoUrl: "" };
                      }
                  }
                  
                  const otherUser = allUsersMap[chat.otherUid];
                  const avatar = otherUser.photoUrl || `https://ui-avatars.com/api/?name=${otherUser.name || 'U'}&background=ffffff&color=000`;
                  const timeStr = formatTime(chat.lastMessageTime);
                  
                  html += `
                  <div class="flex items-center px-4 py-3 glass-item cursor-pointer border-b border-white/20 transition-colors" onclick="openChat('${chat.otherUid}')">
                      <img src="${avatar}" class="w-14 h-14 rounded-full object-cover mr-4 bg-white/50 border border-white/60 shadow-sm">
                      <div class="flex-1 min-w-0">
                          <div class="flex justify-between items-baseline mb-0.5">
                              <h3 class="font-semibold text-[16px] text-gray-900 truncate pr-2 tracking-tight">${otherUser.name}</h3>
                              <span class="text-xs text-gray-500 font-medium whitespace-nowrap">${timeStr}</span>
                          </div>
                          <p class="text-[14px] text-gray-600 truncate-1">${chat.lastMessage || '...'}</p>
                      </div>
                  </div>`;
              }
              chatListEl.innerHTML = html;
          }, (error) => {
              el("chat-list").innerHTML = `<div class="p-8 text-center text-red-600 bg-red-50/50 backdrop-blur-md m-4 rounded-2xl border border-red-200">
                  <p class="font-bold mb-2">Erro de Permissão!</p>
                  <p class="text-sm">O seu Firebase está a bloquear a leitura da coleção "chats".</p>
              </div>`;
          });
      }

      el("new-chat-btn").addEventListener("click", () => {
          showScreen("contacts-screen");
          el("contact-search-input").value = ""; // Limpar a pesquisa ao abrir
          loadContacts();
      });

      el("back-from-contacts-btn").addEventListener("click", () => {
          showScreen("home-screen");
      });

      function loadContacts() {
          el("contacts-list").innerHTML = `<div class="p-8 text-center text-gray-600 font-medium">A carregar contactos...</div>`;
          
          if (unsubs.usersList) unsubs.usersList();
          
          unsubs.usersList = onSnapshot(collection(db, "users"), (snapshot) => {
              let currentContacts = [];
              
              snapshot.forEach(docSnap => {
                  if (docSnap.id === currentUser.uid) return;
                  
                  const user = docSnap.data();
                  user.id = docSnap.id; // Guardar o ID para o clique
                  allUsersMap[docSnap.id] = user; 
                  currentContacts.push(user);
              });
              
              // Ordenar contactos por ordem alfabética (ignorando maiúsculas/minúsculas)
              currentContacts.sort((a, b) => {
                  const nameA = (a.name || '').toLowerCase();
                  const nameB = (b.name || '').toLowerCase();
                  return nameA.localeCompare(nameB);
              });

              renderContactsList(currentContacts);
              
          }, (error) => {
              el("contacts-list").innerHTML = `<div class="p-8 text-center text-red-600 bg-red-50/50 backdrop-blur-md m-4 rounded-2xl border border-red-200">
                  <p class="font-bold mb-2">Acesso Negado aos Contactos</p>
                  <p class="text-sm">As regras do seu Firebase não permitem ler a coleção "users".</p>
              </div>`;
              el("contacts-count").textContent = "Erro";
          });
      }

      // Função auxiliar para renderizar a lista de contactos
      function renderContactsList(contacts) {
          let html = '';
          let count = 0;
          
          contacts.forEach(user => {
              count++;
              const avatar = user.photoUrl || `https://ui-avatars.com/api/?name=${user.name || 'U'}&background=ffffff&color=000`;
              const statusLabel = user.isOnline ? '<span class="text-apple-blue font-semibold text-xs">Online</span>' : '<span class="text-gray-500 text-xs">Offline</span>';
              
              html += `
              <div class="contact-item flex items-center px-4 py-3 glass-item cursor-pointer border-b border-white/20 transition-colors" onclick="openChat('${user.id}')" data-name="${(user.name || '').toLowerCase()}">
                  <div class="relative">
                    <img src="${avatar}" class="w-12 h-12 rounded-full object-cover mr-4 bg-white/50 border border-white/60 shadow-sm">
                    ${user.isOnline ? '<div class="absolute bottom-0 right-4 w-3.5 h-3.5 bg-green-500 border-2 border-white/80 rounded-full"></div>' : ''}
                  </div>
                  <div class="flex-1 min-w-0">
                      <h3 class="font-semibold text-[16px] text-gray-900 truncate tracking-tight">${user.name || 'Sem Nome'}</h3>
                      <p class="text-[13px] text-gray-600 truncate-1 mt-0.5">${user.course || statusLabel}</p>
                  </div>
              </div>`;
          });
          
          el("contacts-list").innerHTML = html;
          el("contacts-count").textContent = `${count} contactos`;
      }

      // Lógica de pesquisa (Filtro em tempo real)
      el("contact-search-input").addEventListener("input", (e) => {
          const searchTerm = e.target.value.toLowerCase();
          const items = document.querySelectorAll(".contact-item");
          
          items.forEach(item => {
              const name = item.getAttribute("data-name");
              if (name.includes(searchTerm)) {
                  item.style.display = "flex";
              } else {
                  item.style.display = "none";
              }
          });
      });

      window.openChat = async function(otherUid) {
          showScreen("active-chat-screen");
          
          if (unsubs.activeMessages) unsubs.activeMessages();
          if (unsubs.targetPresence) unsubs.targetPresence();
          
          el("messages-container").innerHTML = '';
          el("message-input").value = '';
          
          activeChatId = getChatId(currentUser.uid, otherUid);
          targetUser = allUsersMap[otherUid];
          
          try {
              if (!targetUser) {
                  const snap = await getDoc(doc(db, "users", otherUid));
                  if(snap.exists()) {
                      targetUser = snap.data();
                      allUsersMap[otherUid] = targetUser;
                  }
              }

              const avatar = targetUser?.photoUrl || `https://ui-avatars.com/api/?name=${targetUser?.name || 'U'}&background=ffffff&color=000`;
              el("active-chat-name").textContent = targetUser?.name || 'Utilizador';
              el("active-chat-avatar").src = avatar;

              unsubs.targetPresence = onSnapshot(doc(db, "users", otherUid), (docSnap) => {
                  if (docSnap.exists()) {
                      const data = docSnap.data();
                      targetUser = data;
                      const statusEl = el("active-chat-status");
                      if (data.isOnline) {
                          statusEl.textContent = "Ativo agora";
                          statusEl.classList.add("text-apple-blue", "font-semibold");
                          statusEl.classList.remove("text-gray-600");
                      } else {
                          let lastSeenStr = "Offline";
                          if (data.lastSeen && typeof data.lastSeen.toDate === 'function') {
                              const date = data.lastSeen.toDate();
                              const today = new Date();
                              if (date.getDate() === today.getDate() && date.getMonth() === today.getMonth()) {
                                  lastSeenStr = `Visto hoje às ${formatTime(data.lastSeen)}`;
                              } else {
                                  lastSeenStr = `Visto a ${date.toLocaleDateString('pt-PT')} ${formatTime(data.lastSeen)}`;
                              }
                          }
                          statusEl.textContent = lastSeenStr;
                          statusEl.classList.remove("text-apple-blue", "font-semibold");
                          statusEl.classList.add("text-gray-600");
                      }
                  }
              }, (error) => {
                  el("active-chat-status").textContent = "Estado Indisponível";
              });

              const chatRef = doc(db, "chats", activeChatId);
              try {
                  const chatSnap = await getDoc(chatRef);
                  if (!chatSnap.exists()) {
                      await setDoc(chatRef, {
                          participants: [currentUser.uid, otherUid],
                          lastMessage: "",
                          lastMessageTime: serverTimestamp()
                      });
                  }
              } catch (e) {
                  // Se a leitura falhar (porque o doc não existe e a regra bloqueia), 
                  // forçamos a criação do documento com os participantes para garantir acesso.
                  await setDoc(chatRef, {
                      participants: [currentUser.uid, otherUid]
                  }, { merge: true });
              }

              const msgsQ = collection(db, "chats", activeChatId, "messages");

              unsubs.activeMessages = onSnapshot(msgsQ, (snapshot) => {
                  const container = el("messages-container");
                  let html = '';
                  const msgsData = [];
                  
                  snapshot.forEach(msgSnap => msgsData.push(msgSnap.data()));

                  msgsData.sort((a, b) => {
                      const timeA = a.timestamp?.toMillis() || 0;
                      const timeB = b.timestamp?.toMillis() || 0;
                      return timeA - timeB;
                  });
                  
                  msgsData.forEach(msg => {
                      const isMe = msg.senderId === currentUser.uid;
                      const timeStr = formatTime(msg.timestamp);
                      
                      // Apple iMessage Glass Style Bubbles
                      if (isMe) {
                          html += `
                          <div class="flex justify-end fade-in">
                              <div class="max-w-[75%] rounded-[1.2rem] rounded-br-[0.3rem] p-2.5 px-4 shadow-sm relative text-[15px] bg-blue-500/80 backdrop-blur-md text-white border border-blue-400/50">
                                  <p class="leading-snug pb-3">${msg.text}</p>
                                  <span class="text-[10px] text-white/70 absolute bottom-1 right-2.5 font-medium">${timeStr}</span>
                              </div>
                          </div>`;
                      } else {
                          html += `
                          <div class="flex justify-start fade-in">
                              <div class="max-w-[75%] rounded-[1.2rem] rounded-bl-[0.3rem] p-2.5 px-4 shadow-sm relative text-[15px] bg-white/60 backdrop-blur-md text-gray-900 border border-white/50">
                                  <p class="leading-snug pb-3">${msg.text}</p>
                                  <span class="text-[10px] text-gray-500 absolute bottom-1 right-2.5 font-medium">${timeStr}</span>
                              </div>
                          </div>`;
                      }
                  });
                  
                  container.innerHTML = html;
                  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
              }, (error) => {
                  el("messages-container").innerHTML = `<div class="p-8 text-center text-red-600 bg-red-50/50 backdrop-blur-md m-4 rounded-2xl border border-red-200">
                      <p class="font-bold mb-2">Erro de Permissão!</p>
                      <p class="text-sm">Não é possível ler as mensagens.</p>
                  </div>`;
              });

          } catch (err) {
              el("messages-container").innerHTML = `<div class="p-8 text-center text-red-600 bg-red-50/50 backdrop-blur-md m-4 rounded-2xl border border-red-200">
                  <p class="font-bold mb-2">Acesso Negado</p>
                  <p class="text-sm">A falta de permissões bloqueou a tentativa de iniciar esta conversa.</p>
              </div>`;
          }
      };

      el("back-to-home-btn").addEventListener("click", () => {
          if (unsubs.activeMessages) unsubs.activeMessages();
          if (unsubs.targetPresence) unsubs.targetPresence();
          activeChatId = null;
          showScreen("home-screen");
      });

      async function sendMessage() {
          const input = el("message-input");
          const text = input.value.trim();
          if (!text || !activeChatId || !currentUser) return;
          
          const chatRef = doc(db, "chats", activeChatId);
          input.value = "";
          
          try {
              await setDoc(chatRef, {
                  participants: activeChatId.split('_'),
                  lastMessage: text,
                  lastMessageTime: serverTimestamp()
              }, { merge: true });

              await addDoc(collection(db, "chats", activeChatId, "messages"), {
                  senderId: currentUser.uid,
                  text: text,
                  timestamp: serverTimestamp()
              });
              
          } catch(e) {
              if(e.code === 'permission-denied') {
                  alert("Erro de permissão: Verifique as Regras no Console do Firebase.");
              } else {
                  alert("Erro ao enviar mensagem.");
              }
          }
      }

      el("send-msg-btn").addEventListener("click", sendMessage);
      el("message-input").addEventListener("keypress", (e) => {
          if (e.key === 'Enter') sendMessage();
      });

    </script>
  </body>
</html>
